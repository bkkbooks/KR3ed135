body:
  text: 怪證奇方雜録附足轉筋密念木爪二字即愈諸骨哽解開衣帶低頭視下部數次其骨不下行則上出矣一切蟲入耳如在左耳以手緊閉右耳努氣至左耳其蟲自出一切塵埃等物眯目自以手撐開眼皮內盡力啐之數口即出不勞倩人吹也傷寒無汗鄉村無藥去處令其人盤足而坐以兩手指相交抱腦後低扣向前數十次汗出為度胡松谷方冬月極冷以兩手緊握其拳一時即汗出無朝以兩手夾耳根上下擦一十二次永無聾瞶之患無事時常閉其口以上下齒咬住永無痛壞之患無朝靜坐以兩手搓熱擦兩腎一十二次即腰不痛又法用兩手搓熱擦足心一百二十次兩足俱擦能治百病修心要作長生客煉性當為活死人一分塵心盡則明一分道十分盡則明十分道塵心絶盡則可全於性色心絶盡則可全於命無明心絶盡則可得於沖和刻刻常披己過方得神氣內安則為真功不見他人非則為真行手足或發瘤白粱米粉鐵鐺熬赤衆唾調塗寸厚即消魚骨鯁即令其人到轉筋頭食之骨自下又法即魚刺點插其人頭髮上即自上一切火眼以鹽擦牙手接涎唾洗眼數次則愈兩眼腫如桃大用豬鬃四根各插入攢竹睛明四穴拈之得睡一覺醒去之妙戴溪築方蜈蚣咬以右手大指中指托地中指盡處掐起少土傅之勿使患者知妙救溺死法將溺者以腹橫架板凳或牛背上使頭自下倒瀝去腹中之水即活摩一切癰疽法春初雷始發聲急以兩手指雷候聲止乃止七日勿洗平此後有惡蟲所傷及瘡腫摩之隨手而消救縊法徐徐抱住解繩不得截斷上下安被臥之令兩人以管吹其兩耳此法最好無不活者自旦至暮雖冷亦可救自暮至旦陰盛則難救意庵傳收蠍螫法每年除夜左手拽起前裾右手執三尺長棍問門楣上敲三下念咒云蠍蠍蠍螫螫螫不向梁上走卻來這裡螫一敲敲八節咒畢吸氣一口吹於杖頭復吸其氣吹於執杖手心如此三次即已遇有喝螫以手摩之即不痛可用一年次年除夜又加法為之否則不驗收一切腫毒法每朝向東書三字於腫上咒曰赫赫陽陽日出東方神筆到處萬病消亡一如律令敕𫩠食糸亠龶𫩠膳𫩠食車𫩠食殊𫩠𩜊𫩠食怪𫩠𩚵𫩠食存𫩠餔已上用好京墨磨得極濃每念咒一遍書符字一個於腫毒上未成則消已成則潰極驗截瘧法告狀人某於某年月日自不合打從太行山下過遇著五鬼一飢二飽三寒四冷五惱向被纏害以致飲食少進身體倦怠如蒙准告乞拘到案審究禁革發遣遠方庶免纏害為便為此具告可備福事於當境神祠告之即愈蔥慰法治陰證生蔥一束以繩扎如杯大切去根葉留二寸以火燒一面令熱著臍下外以鬥尉之令熱透中便作三四餅壞則易之俟病人手溫有汗乃服四逆湯調理火攻法以火燒地坑令赤以酒傾入待滲干以草荐鋪上病人臥之上蓋取汗妙或燒火磚噴以醋紙包入被中薰之或燒熱丸噴醋紙包尉胸背四肢已上皆取汗之法也水攻法審其邪熱輕重如欲飲一斗止與五升不可過飲少待半時又欲飲仍新汲與之蓋頻與水不妨但不宜一飲而極意也凡飲水後寒戰交作汗出而解者即愈也若欲飲而不與則乾燥無由而作汗反煩躁悶亂矣古人以傷寒時氣欲飲水者為欲解凡熱盛者必用水清法或以噀面或以澆身或置病人於水中或浸手足或浸舌漱口而不欲咽者大抵陽證陽脈內實熱甚煩渴舌燥者與水無礙凡中暑霍亂欲水者少與之慎勿恣靈火針硫黃雄黃各一錢鬧洋花一兩牙皂三錢川烏草烏各五錢熟艾一兩鈔卷如指大以紙封之按痛處上以紙隔五六層針之病人叫痛即起以膏藥貼之則不害妙甚咒云天火地火雷火針天天開針地地裂針病萬病消滅吾奉紫虛元君急急如律令勑遺精夢泄法每夜側身臥兩足縮起彎腰手握拳心無外慕則不泄矣口中言少心頭事少壯裹食少自然睡少依此四少神仙決了師曰酒為亂性之漿肉為斷命之物直須不吃為上酒肉犯之猶可恕若犯於色罪不容誅蓋色之害人甚於狼虎敗人善行損人善事亡精滅神至於殞軀故為道人之大孽也又曰身不勞而功不大行不廣而心不死欲得心中神不出莫向靈臺留一物物在心中神不清耗散真精損筋骨色身元有限情欲浩無涯癡似蜂貪蜜狂如蝶戀花又詩朝朝掃心地掃著越不靜若要心地靜撇下苕帚柄又大道不遠在身中物即皆空性不空性苦不空和氣住氣婦元海壽無窮破衲頭爛唐巾個個出來會點金如何不點自家用留下方兒哄別人二五為一天地至精情以口訣難以書傳鉛汞鼎中居煉成無價珠都來兩個字了徹萬字書又李小仙附雜録醫有三十科大方脈科小方脈科婦人科傷寒科風科口齒咽喉科瘡腫科針灸科眼科正骨科金鏃科祝由科養生科察色脈一定吉凶脈地也色天也地生天則順天生地則逆假令得弦脈而面赤色地生天也兒生母兮差速也假令得弦脈而面黑色天生地也母仰子兮退遲也凡欲灸者先診其脈脈浮者不可灸灸則必變罷大無言用古方治今病正如拆舊屋湊新屋其材木非一未嘗經匠氏之手其可用乎由是又思許學士曰豫讀仲景書用仲景法然未嘗守仲景之方乃為得仲景之心也五臟者身之強頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨腦將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死十二官心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中臣使之官喜樂出焉脾胃倉廩之官五味出焉大腸傳導之官變化出焉小腸受盛之官化物出焉腎者作強之官伎巧出焉三焦決瀆之官水道出焉膀胱州都之官津液出焉氣化則能出矣精明五色氣之華赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼壁之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼夫精明者所以視萬物別白黑審短長以長為短以白為黑如是則精衰矣視而可見黃赤為熱白為寒青黑為痛百病生於氣怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結炅音桂熱也夢陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢與甚飢則夢取肝氣盛則夢怒肺氣盛則夢哭短蟲多則夢聚衆長蟲多則夢相擊毀傷四氣調神春三月夜臥早起廣步於庭披髮緩形以使志生夏三月夜臥早起使氣得泄秋三月早臥早起與雞俱使志安寧使肺氣清冬三月早臥早起必待日光去寒就溫無泄皮膚此養生之道也六失一失於不察二失於不信三失於過時四失於不擇醫五失於不識病六失於不知藥六不治驕恣不論於理一也輕命重財二也衣食不能適三也陰陽並臟氣不定四也形羸不能服藥五也信巫不信醫六也我但臥病即於腦前不時手寫死字則百般思慮俱息此心便得安靜勝如服藥此真無上妙方也又有一等明知畏死而怕人知覺諱而不言或病已重而猶強作輕淺態度以欺人者欺又不知畏死而反以取死尤可笑哉東坡云脈之難明古今所病也至虛有盛候大實有羸狀疑似之間便有生死之異士大夫多祕所患以驗醫能否吾平生求醫蓋於平時默驗其工拙有疾請療必盡告以所患便醫瞭然知患之所在虛實冷熱先定於中脈之疑似不能惑也故雖中醫法吾疾常愈吾求疾愈而已豈不因醫為事哉或問丹溪先生曰醫之為事切脈察病用藥先生必以讀儒書者能之何也曰非四書無以窮理盡性成格物致知之功非易無以知陰陽造化功用消長生成之道升降浮沉之理孫真人曰不知易者不足以言太醫問曰醫書何先曰必須先讀內經本草脈經非內經無以識病非本草無以識藥非脈經無以診候然後卻參諸家之說治病用藥猶權衡不可毫釐輕重也若以執古方而治今病更不斟量吾不知其不能無少差也問曰素難之外更看何書為要曰外感法仲景內傷法東垣則仲景治法更合內經然於諸書皆須覽過以長識見問曰一人之證久伏床枕處方既定前後又有加減者何也曰內有初中虛實之異外有八風之變四時更易氣運迭遷七情所動是以主病之藥雖不更佐便豈無加減也先生曰治病必分血氣氣病補血雖不中病亦無害也血病補氣則血愈虛散散則氣血俱虛是謂誅罰無過也病或晝輕夜重者血病也晝重夜輕者氣病也故晝陽夜陰也座右銘曰學問所以別理欲開昏閉衣食所以資身體廣恩惠言行要留好樣與兒孫心術要不險為良地銘曰在表治表在裡治里汗下之間反掌生死上制以緩下制以急緩急不分無過受擊新病猛除久病寬治不久不新寬猛相濟求治不識必當自寶毋得苟就輕此至道病不可治必當速已毋得容情啓人之毀
