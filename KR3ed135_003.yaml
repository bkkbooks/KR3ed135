body:
  text: 卷下治男子陰證傷寒因女色者唇黑甲青四肢冷陰縮大附子一枚一兩重者小便煮去其毒量用二三錢大人參三錢乾薑一錢五分水煎服陽回去附子調理全愈又方小雞一隻軟肚邊去毛切破夾陰莖換四五隻陽回為度神效神效治頭風六月畏寒重裹綿絮三十年不愈予以蕎麥粉二升水調打餅二片更換合頭上微汗出即愈治腿風痛生薑半斤搗爛如泥入火酒一杯調勻一服止二服而愈治風痛數年余以七葉黃荊取根皮加接骨草五加皮酒二鍾煎一鍾次日溫服即愈如聖散治風氣遍身疼痛草烏半斤薑蔥等分共搗置陰地上待生白毛曬乾為末每酒下三分三四服必愈惟五月雷天好修合面黃而氣短此元氣損少之故也乾薑少煨生附子各五錢硃砂一兩另研赤石脂一兩五錢酒糊丸如黑豆大每服十五丸加至二三十丸米飲下小便數而不禁茯苓湯下怔忡多忘魘夢不已茯神湯下治癰瘡有惡肉不能去者膏藥內用巴豆末雄黃末各少許不傷良肉只去惡肉又方用丁香為末上之深則紝之淺則摻之外以膏藥護之一切腫毒不消者薑汁調輕粉塗之立消陰頭生瘡蜜煎甘草塗之神效又治湯火瘡清胃散治胃熱上下牙疼不可忍牽引頭腦發熱腫痛生地黃黃連當歸身一錢牡丹皮一錢五分並酒洗升麻二錢水煎服效如神渴欲飲水水入則吐名曰水逆五苓散妙渴欲飲水不止者文蛤為末沸湯下妙治飲水水在脅下咳唾引痛謂之懸飲用十棗湯芫花炒甘遂大戟各等分為末水一升半先煮肥大棗十枚煎八合去滓強人納藥末一錢瘦人五分平旦溫服不下者明日再服五分得快下後糜粥自養而愈食生肉中毒掘地深三尺取下土三升以水五升數沸取青汁服一升即愈食牛肉中毒甘草煮汁飲即解又因而生疔瘡者以茶花根水煎一碗服妙又方以生菖蒲擂爛以熱酒調取汁服一碗汗出而愈凡鳥獸中毒箭死者其肉有毒用此解之大豆煮汁及鹽服之妙食諸果中毒豬骨燒灰冷水下一匕梨不可多食令人寒中金瘡產婦皆不可食食蟹中毒紫蘇煮汁飲三升瘥食冬瓜亦妙食花椒氣閉欲絕者飲冷水即解凡飲解毒藥雖云救急不可熱服諸毒得熱便甚宜冷飲之水銀入人耳及入六畜等耳皆死以金銀著耳邊水銀即吐出傷寒小結胸按之微痛甘遂水先煎後入大黃芒硝一服下之而愈開胃湯治傷寒失音人參黃耆蒼朮白朮當歸各一錢陳皮半去白茯苓乾薑半夏細辛橘皮各五分五味子四分芍藥二錢黃柏甘草各少許水煎服愈治瘧柴胡半夏與黃芩甘草常山白茯苓蒼朮烏梅薑草果檳榔蘇葉及青陳水煎服妙意庵治婦人患心痛數年茶末一分人言半分白湯調下吐瘀血一塊而愈衄血小勞及酒後即出白朮梔子黃芩黃連等分為末粥丸米飲下每服三十丸久服即效血虛上行人參一兩為末每酒下三錢妙冷氣吐白沫良薑末三分陳火酒調下嘈雜時吐清水上好廣陳皮去白為末五更起坐床上安藥五分於手心男左女右干舐下而眠服三朝必效如陳皮不好即不驗翻胃水澄螺螄泥曬乾每火酒下一錢胡松谷方治途中遭雨打面腫大甚麻黃湯加黑豆炒三合水煎熱服大汗出即消前後便秘取烏桕樹正根搗爛水煎服立通傍根能止治熱淋痛甚渴欲飲水滑石一兩煅紅入醋淬一次水飛過炙甘草一錢二分和勻五更井花水下日二服神效冷水多飲之亦妙治大病後身面俱黃四肢無力吐血成盆諸藥不效螺螄十一個水漂去泥連殼搗爛露之立更取澄清水服三二次黃去血止而愈平昔發痧煨鹽一錢五分吳茱萸炒黃每歲一粒共為末滾酒下絞腸痧亦妙九種心痛噁心吐水積聚氣滯是有蟲也取出蟲即愈乾漆四兩慢火燒煙盡醋糊為丸綠豆大食後酒醋熱下五七丸不愈加服腰痛曲而難伸山楂為末茶酒鹽湯隨下神效外腎紅腫大如升者川山甲三片炙焦取末白姜蠶炒杏仁白芷各二錢麝香二分乳香五分大黃五錢俱為細末歸尾一兩蜜糖一兩水二碗煎一碗空心調下一服不盡作二服亦可或用生蜜和為丸亦可耳鳴坐下微煨綿包塞耳內即止耳後軟節愈而復發松香八分銅青二分天麻子同搗為膏紙攤貼妙耳猝痛核桃油滴入即止耳膿枯礬一錢黃丹三分先以綿絞膿干吹入妙鼻生贅肉臭不可近痛不可搖束手待斃白礬加硇砂少許吹入即化水而愈鼻常流清涕以蓽撥末吹入即愈赤鼻枯礬三錢硫黃二錢臥時取三分於手心唾調以指塗鼻孔內睡醒再塗三日則變色七日全愈走馬牙疳及口瘡黃連升麻等分為末米泔水洗淨摻之妙又方鬱金磨水下更妙風牙疼良薑細辛全蠍為末擦西獄蓮花峰斷碑方豬牙皂角及生薑西國升麻熟地黃木律旱蓮槐角子細辛荷蒂要相當青鹽等分同燒煅研末將來使最良揩齒固牙髭鬢黑誰知世上有仙方木律即梧桐淚共入新礶鹽泥固濟倒放磚上煅至煙盡次日取出擦牙甚妙口禁不開巴豆油紙燒煙煍鼻即開又治喉閉甚妙手指害蛇頭瘡腫痛甚者寒水石雄黃為末水調傅效又方烏梅肉魚鮓共搗爛傅之妙治冬居大室衣薄表有大寒壅遏裡熱火邪不得舒伸故血於口後遂成衄與麻黃湯一汗而愈白牙散白芷七分升麻一錢石膏一錢五分羊脛骨燒灰一錢麝香少許為末擦牙吐血氣衛穴以三稜針出血立止鵲石散治傷寒發狂逾垣上屋黃連寒水石各一錢濃煎甘草湯冷調下妙鬲食鬲氣梅核氣甘遂五錢面里煅木香一錢為末壯者用一錢弱者五分酒調下胃寒嘔吐不止陳皮二錢生薑六錢水煎熱服足轉筋入腹多著鹽水煎溫洗脫肛不收大艾葉濃煎汁漫之再用芭蕉葉托上用之甚效食已即吐者大黃四錢甘草一兩水煎服乾嘔噦若手足厥者橘皮四兩生薑半斤用水煎服嘔吐而病在膈上後思水者欲解也豬苓茯苓白朮等分為末米飲下一匕日三服胃反嘔吐者半夏二升不切人參三兩白蜜一升水一斗二升如和蜜揚之二百四十遍煎至四升溫服一升余再服噦逆橘皮竹茹湯又治噫氣五七日不止者橘皮二升竹茹二升大棗三十個生薑半斤甘草五兩人參一兩水煎二三服下利譫語者有燥屎也大黃四兩厚朴二兩枳實大者三枚水煎服得利則止腎著湯治腰曲不能伸赤茯苓白朮各四兩炙甘草三兩乾薑二兩炮每五錢二服秘真丸治白淫小便不止精氣不固及有餘瀝或夢陰人交而泄龍骨一兩另研大訶子五個去核硃砂一兩分一半為衣麵糊丸綠豆大每服一丸空心調下冷水亦得不可多服服則大秘蔥白亦可下利清穀裡寒外熱汗出而厥者附子一枚生用乾薑二兩炙甘草水煎溫服下利已瘥至其時復發者以病不盡故也當下而愈大黃厚朴枳實芒硝水煎服一下而愈陰狐疝氣者偏有大小時時上下蜘蛛十四個熬焦桂枝五錢米飯調服一匕日再服蜜丸亦可咳逆上氣時時唾濁但坐不得眠皂角八兩刮去皮炙酥為末蜜為丸棗膏和湯服三丸二三夜一服治心痛澈背背痛澈心赤石脂蜀椒乾薑各一兩附子五錢炮烏頭二錢半炮蜜丸每服一丸二三服效治腹患癰口出血膿如蟹吐沫此肉潰透膜也瘡瘍透膜十無一生須以大補亦不能救惟待膿出自之戒也治婦人腹內一塊不時作痛痛則人事不知脈沉細則非瘡毒劉河間云失笑散治疝氣及婦人血氣並效二劑而平失笑散蒲黃炒五靈脂等分每二錢醋湯調下治小兒十歲腹脹痛服消導藥不應其脈右關沉伏此食積也詢之果因食粽得此以白酒面熱酒服而愈治睡間蟲入耳痛甚用生薑擦腎鼻其尿自出取滴耳內妙用香油滴入則蟲死難出治左足大指赤腫焮痛此脾經積毒下注而然各脫疽喜色赤而痛以人參敗毒散去人參桔梗加金銀花白芷天黃二劑更以金銀花甘草瓜蔞四劑而愈意庵治婦人足大指紫腫痛不可忍用大黃朴硝石膏瓜蔞根大下數次而愈治患疽色紫赤不痛以鬲蒜炙五十壯不知痛再炙至百壯而愈孫真人云脫疽之症急斬去之如毒延腹內則不治紫黑者不治治女子誤吞針入腹同蠶豆菱熟同韭菜食之針從大便出治誤吞銅錢胡桃仁食之自化又食荸薺亦好治開肆市藥忽患頭腫如斗大痛如錐刺諸藥不效復教以甘草濃煎湯煮之就令溫服飲一二盞遂愈蓋聞藥毒所致也甘草解之金瘡破腹腸突出以幹人糞抹腸頭上自入老人遺尿研薔薇根汁酒調下嗽欲死者半夏一兩二錢湯泡水煎二分服中惡卒死灸臍中百壯以皂角末吹鼻或韭汁灌耳治婦人膝冷至足湯火不能溫以附子治之不效用四物湯加黃柏知母四劑而愈治婦初足下強硬數月膝亦硬一年則手足骨節俱不能動臥床如癱風診之又非風證知為虛也以人參當歸附子煎膏盡二斤而起赤白痢初來三五日用大黃一兩水煎服下之下後用收拾湯罌粟殼二錢去筋膜炒川芎陳皮甘草各五分加燈心紅棗水煎服如腹脹加草果五分治痢後之妙藥也封臍膏治大人小兒水泄赤白痢陳小粉炒黃為末每四兩加乳沒各一兩每用一匙醋調封臍膏藥貼之重者一日一換即愈冷氣痛火酒入飛鹽服之妙小兒來尿不禁蜜一杯車前草一科搗汁入內略熬露一夜清晨服之妙婦人新久腹痛玄胡蒼朮檳榔良薑各一錢茯苓肉桂丁皮乾薑各五分稜莪甘草青皮砂仁各八分連須蔥白三根水煎服效如神萬山觀蘆吸散治一切嗽乃洞賓祖師仙傳方也軟石膏煅一日自蘇為度款冬花蕊揀淨官桂去渣甘草炙四味各制各篩稱勻各和再研再篩二三次每日臨晚仰臥以蘆管吸入三分茶清咽之七日必效用三分置舌上而睡次早飲白湯亦妙催生並胎衣不下用鰾膠八寸瓦上焙乾燒灰酒送下產後兒枕痛山楂一兩搗碎水二鍾煎一鍾入砂糖二匙服之痛立止小兒吐瀉巴豆一粒去殼燈上燒黃蠟一小塊燈上燒滴入水中同擂丸如黍米大小兒五九大兒七丸用蓮子七個燈草七段湯送下大便不通芒硝川大黃巴豆去油各五錢水丸如梧桐子每日空心粥飲下七丸不效再加丸服小便血用病人頭髮一丸燒灰好酒調水瀉腹中響如雷者軟石膏火煅老米飲為丸如梧桐子大飛過黃丹為衣每服二十丸米飲下不二服即效腫睡蟬退為末入牯豬膽蜜和調塗赤小豆亦可食過飲痞脹陳吳茱萸半升水煎濃汁入馬牙硝一兩服良久不轉更進一服必效心痛石菖蒲良薑為末白湯下一錢火燒瘡土蜂窩硃砂各一錢片腦一分雞子清調服腦癰石灰入飲內搗爛傅之行路腳打破腫甚乳香沒藥油調傅瘡口立收再用黃柏大黃雞子清調傅腫處即消噤口痢蜂蜜砂糖並薑汁湯下瀉用老米飲下肚痛炒米湯下忌魚腥生冷胸膈痰壅閉塞不快半夏為末薑汁調濕紙包煨香即取出切碎入水煎服妙牛皮癬生騾皮一塊入皮硝醃之燒灰油搽一掃光絞腸痧胡椒綠豆各二十四粒擂細酒調服妙吃飲直出梔子二十個微炒去殼入水煎服蟲蛙牙痛巴豆花椒飲丸安窩內點痣方巴豆一錢入石灰同炒去石灰人言一錢糯米五分炒和勻點之如有痔丁點之待爛唾調醫痔藥傅上以紙封之則氣閉而易愈治大驚九竅出血平旦初汲井花水噀面即止五淋用破席水煎服腫毒堅硬不穿歸尾赤芍藥芎芷麻黃甘草烏藥枳殼茴香木通何首烏獨活連須蔥白一根水煎熱服汁出即穿油炒半夏大治濕痰又治氣喘又治心疼粥丸薑湯下三十丸房中妙術白馬莖陰乾為末和肉蓯蓉蜜丸空心酒下四十丸治乳癰腫及頭面韭菜園內尋蚯蚓糞生擂絕細篩淨以井水調塗頭面即全消矣治發背初起麻黃十斤搗碎川歸防風各一斤甘草五錢熬膏滾酒調下一匕即汗出而愈疫病不染方蒼耳草頂上嫩苗焙乾為末用三指撮冷水下妙蟻窠瘡蒼耳草車前草松毛煎湯洗百草霜摻之收口妙治牙惡熱飲痛黃連末擦之立止治牙冷痛蒜半瓣巴豆一粒綿裹反塞耳內產後血氣疼白雞冠花酒煎服妙治喉秘枯礬姜蠶等分為末吹入效治大腸燥秘當歸酒洗熟地黃酒浸各八分桃仁一錢去皮尖條芩酒大黃酒人參各五分升麻三分生甘草二分水煎服療痔神方懞子粉糯米粉各一升炒黃以滾水調作果飯上蒸熟空心食遠吃之四五次效紫霜丸治小兒宿滯不消胸膈痞滿泄瀉如痢等積及硬塊如石妙不盡述杏仁四十九粒去皮尖另研巴豆三十粒去心皮去油赤石脂一兩代赭石一兩煅紅醋淬五七次水飛過湯浸蒸餅為丸黍米大三歲小兒每服二三丸四五歲服五六丸十歲服七丸而止入早飯中飯內吞之晚飯不可服收斂發背一切瘡口鱉甲燒存性研極細摻之妙洗赤眼銅綠黃連芒硝白鹽生薑少許水煎一沸紙濾洗之酒後嗽白殭蠶炒為末每茶下一錢九漏煉松枝為末填孔內令滿日三四次七日瘥大效卒不得小便車前草一把桑白皮半兩水三升煎一升頓服又方酒下亂髮灰一雲水下疥瘡硫黃密陀僧等分油調擦口吐清水干艾水煎服血崩老豬母糞燒存性為末酒下嘔吐用二陳湯加丁香三分砂仁五分熱止去丁香加石膏薑棗煎服乏乳川山甲七片新瓦焙燥為末酒下小兒水泄風化石灰糯米粥丸如芡實大冷水下一丸則好陰囊生瘡痛癢甚蛇床子蒺藜子煎湯浴之永不再發胎衣不下朴硝二錢童便調下催生散白芷二錢燒存性或炒滑石一錢百草霜二錢以當歸川芎紫蘇煎湯加童便好酒各一合調下火丹銀硃入雞子清銀簪調傅治婦人乳毒及一切初起腫毒服之則消敗龜板一枚煅去火毒每三四錢酒調下一捻金專治咳嗽知母貝母各一兩巴豆四十九粒去油每臨臥用生薑一片蘸藥一豆許嚼下舌拄上齶臥則效臁瘡公雞肭皮洗淨貼之日一換十日全愈一切時行陰證傷寒不拘老幼惟孕婦不可服白芷二兩甘草一兩每服一兩水一碗薑蔥共煎減半熱服一汗為度有半月不汗者服之則汗只許濟人不許賣錢新添三黃丸治五勞七傷流濕潤燥消渴煩熱甚者大黃黃芩黃連等分煉蜜丸每三十丸加至五十丸薑湯下日三服妙大小便不通用鐵腳丸皂角炙酒麵糊丸酒下蓽澄茄丸治中焦痞塞氣逆上攻心腹㽲痛吐逆下痢不美飲食蓽澄茄五錢良薑二兩神麯炒青皮去白桂各一兩阿魏五錢醋曲裹煨醋曲糊丸薑湯下寒嗽麻黃四兩官桂一兩為末每一二錢以蠟二錢入水煎調下熱嗽喘甚石膏二兩炙甘草五錢每三錢水下又薑汁蜜調下亦可二氣散黑白牽牛等分大麥面同為燒餅臨臥茶下降氣為驗牙痛出血不止調胃承氣蜜丸服之取牙草烏蓽撥各一兩半川椒細辛各三兩擦之自落牙疼土蒺黎鹽水煎熱漱妙噫氣法食物時氣逆即到轉筋頭吸氣一口直嚥下丹田即止救卒死方雄雞冠血吹鼻內又方雞肝及血塗面上灰圍四旁立起治婦人六十二種風及腹中血氣刺痛紅花一兩酒煎服當歸散有孕宜常服則無胎產之苦產後諸病皆主之當歸芍藥黃芩川芎各一斤白朮半斤為末酒下一錢日再服
