body:
  text: 卷上治忽覺自形作兩人並臥不別真假不語問亦無對乃離魂也用硃砂人參茯苓濃煎服真者氣爽而假者即化治鼻中毛出晝夜長一二尺漸漸粗圓如繩痛不可忍摘去更生此因食豬羊血過多而然也用硇砂乳香飯為丸水下十粒早晚各一服病去乃止治蟲如蟹走於皮下作聲如兒啼為筋內之化用雷丸雄黃等分為末摻豬肉上炙而食之即愈治因著艾灸訖火瘸便落瘡內鮮血片片如蝴蝶樣騰空飛去痛不可忍此是血肉俱熱用大黃芒硝等分為末水調下微利即愈治臨臥忽渾身蝨出約五升血肉俱壞而舌尖血出不止用鹽醋湯飲十數次即愈治眼赤鼻張大喘渾身出斑發如銅鐵絲硬乃目中熱毒氣結於下焦用白礬滑石各一兩水三碗煎至一碗半不住口飲盡乃效治遍身忽然肉出如錐癢痛不能飲食名血擁用赤皮蔥燒灰水淋汁洗內服淡豆豉湯數盞而愈治眼前常見禽蟲飛去捉之即無乃肝膽經為疾用酸棗仁羌活玄明粉青葙子各一兩為末每水煎二錢和滓服日三服治眼珠垂下至鼻大便血出名肝脹用羌活水煎數服即愈治腹中有物作聲隨人語言名應聲蟲服雷丸而愈治飲油五升方始快意乃發入胃血裹化為蟲也用雄黃五錢水調服治臥床四肢不能動只進得食好大言說吃物謂之失說物望病如說某肉即以其肉與看不與食之失他物望也睡中流出饞唾即愈治手十指斷壞唯有筋連無節肉內蟲出如燈心長數尺遍身緑手名血餘用茯苓胡黃連煎服愈治遍身皮底渾渾如波浪聲癢不可忍抓之血出不能止名氣奔用人參苦杖青鹽細辛各一兩水二碗煎十數沸飲盡便愈治眼內白眥俱黑見物依舊毛髮直如鐵條不語如醉名血潰用五靈脂酒調下二錢愈治忽然氣上喘不能語口中涎流吐逆齒皆搖動氣出轉大即悶絶名傷寒並熱霍亂用大黃人參各五錢水三盞煎一盞服治口內生肉球有根線長五寸余吐球出方可飲食以手輕捏痛徹於心水調生麝香一錢頻頻服之三日根化而愈治手足甲忽然長倒生肉刺如錐食葵菜自愈治面上及遍身生瘡似貓兒眼有光彩無膿血冬則近脛名白寒瘡多食魚雞蔥韭而愈治脅破腸出臭穢急以香油抹腸送入即不出又以人參枸杞子煎湯淋之皮自合吃豬腎粥十日愈治口鼻中氣出盤旋不散凝似黑蓋過十日漸漸至肩與肉相連堅勝鐵石無由飲食多因瘧後得之用澤蘭水煎日飲三盞五日愈治頭面發熱有光色他人手近如火炙用蒜汁半兩酒調下吐物如蛇遂安治渾身生泡如甘棠梨破則出水內有石一片如指甲大其泡復生抽盡肌肉不可治矣急用三稜莪朮各五兩為末分三服酒調下治夜有醉者誤吞水蛭腹痛黃瘦不進飲食用小死魚三四個豬脂煎熔攪勻入巴豆十粒碎爛和田中干泥丸如緑豆大以田中冷水吞下一丸泄下為度治小便中出屎大便出尿名交腸用舊幞頭燒灰酒下五分愈治玉莖硬不痿精流無歇時如針刺捏之則脆乃為腎滿漏疾用韭子破故紙各一兩為末每三錢水煎日三服即止治身及頭面肉腫如蛇狀用雨濕磚上青苔一錢水調塗立消治大腸內蟲出不斷斷之復生行坐不得鶴蝨末水調服五錢自愈治小兒初生如魚胞又如水晶碎則水流用密陀僧羅極細摻之治兒初生遍身無皮俱是赤肉掘土坑臥一宿即長皮又方白早米粉干撲於上候生皮乃止治項上生瘡如櫻桃有五色瘡破即項皮斷逐日飲牛乳自消治寒熱不止四肢如石擊之如鐘磬聲日漸消瘦用茱萸木香等分水煎一二服即愈治大腸頭出寸余候乾自退落又出名截腸病用芝麻油器盛坐之飲大麻子汁數升愈治鼻腥臭水流以碗盛而視之有鐵色蝦魚如米大走躍捉之即化為水此肉壞矣食雞肉一日二次一月而愈治兩足心凸如腫硬如釘脛骨生闢孔流髓身發寒戰惟思飲酒此肝腎氣冷熱相吞用川烏炮為末敷之內煎韭菜湯服之愈治四肢節脫但有皮連不能舉動名曰筋解用黃蘆酒浸一宿焙為末酒下二錢多服即安治咽喉間生肉層層相疊漸漸腫起有竅出臭氣用臭橘葉煎服愈治腹中如鐵石臍中水出旋變作蟲行之狀繞身匝豕癢痛不忍扒掃不盡濃煎蒼朮浴之又以蒼朮麝香水調服之治眉毛搖動目不能視喚之不應但能飲食用蒜三兩取汁酒調下即愈治毛竅節次血出少間不出即皮脹如鼓口鼻眼目俱脹合名脈溢用生薑汁並水各一二盞服之即安治人面瘡昔人患此於臂上滴酒瘡口中即面赤與物食之即肉脹獨與貝母服之則斂眉閉口若有苦楚之狀乃煎貝母以葦筒灌之數日戍甲而愈治婦人年二十餘腦生一竅口中所咳膿血與竅相應而出此肺痿也用參耆當歸加退熱排膿之劑而愈治患蛇瘕乃蛇精及液沾菜上人誤食之腹內成蛇或食蛇亦有此症其人常飢食之即吐用赤頭蜈蚣一條炙為末分二服酒下治蛟龍瘕用寒食飯三升每食五合日三服吐出蛟龍而愈治鱉瘕痛有來止或食鱉即痛用雞屎一升炒黃投酒中浸一宿焙為末原浸酒調下治雞瘕有病冷痰者醫曰因食白瀹雞過多故也用蒜一枚煮服乃吐一物如升大痰裹開視之乃雞雛也再服吐十三雛而愈治婦産後有傷胞破不能小便常漏濕不幹用生絲絹一尺剪碎白牡丹根皮白及各末一錢水一碗煎至絹爛如餳空心頓服不得作聲作聲即不效治尸厥奄然死去腹中氣走如雷用硫黃一兩焰硝五錢細研分三服好酒煎覺煙起則止溫灌之片時再服即安治諸瘡如蛇出數寸用硫黃塗之即消治眼中視物倒置用藜蘆瓜蒂為粗末水煎服得吐而愈治心漏當胸數竅血液常流二十年用鹿茸酥炙附子炮鹽花棗肉為丸每酒下三十丸即愈治患心疾見物如獅子伊川教以手直前捕之見其無物久久自愈治婦人見滿壁皆蓮花以礞石滾痰丸下之愈治婦人産後忽兩乳細小下垂過小腹痛甚名乳懸用芎歸各二斤內用半斤水煎服余用燒煙燻口鼻二料乃效治婦産後水道中出肉線一條長三四尺動之則痛欲絶先服失笑散數服次以帶皮姜三斤研爛入清油二斤煎油干為度用絹兜起肉線屈曲於水道邊以前姜熏之冷則尉之一日夜縮其大半二日即盡入再服失笑散芎歸湯調理之如肉線斷則不可治矣治患腫毒潰後不時出一細骨用生桐油調密陀僧如膏絹攤貼妙治炎火至五壯血出一縷急如溺手冷欲絶以酒炒黃芩一二錢酒下則止治頭皮內時有蛆出以刀切破皮用絲水葉擠汁搽之蛆出盡絶根治小兒痘爛生蛆以柳條帶葉鋪地將兒臥其上蛆盡出而愈治淵疽之發於肋下久則一竅有聲如嬰兒啼灸陽陵泉二七聲即止而愈治手指攣曲節間疼不可忍漸至斷落以草麻子去殼二兩碎者不用黃連四兩貯瓶內水二升浸之春夏三日秋冬五日每早面東以此水吞下草麻子一粒漸加至四五粒微泄無害忌食動風屢驗治患頭風證耳內常鳴頭上有鳥雀啾啾之聲此頭腦挾風所為也用芎歸湯而愈治傷寒舌出寸余連日不收用梅花腦摻舌上應手而收重者用五錢方愈子和治一婦人木舌脹滿口諸藥罔效以䤵針砭之五七度腫減三日方平血出盈斗治婦人産子舌出不能收以硃砂磚其舌乃令作産兒狀以二女扶之壁外潛堆盆盎令墮地聲響使婦聞而驚則收治婦人忽生蟲一對於地能行長寸余自後月生一對醫以苦參加打蟲藥為丸服之又生一對埋於土中過數日發而視之暴大如拳名子母蟲從此絶根治眼中忽有血如射而出或緣鼻流下但出血多時即經不行乃陰虛相火之病遂用歸身尾生地酒芍加柴胡黃柏知母條芩側柏葉木通桃仁紅花水煎食前服數帖而愈治奶頭裂尋秋後嫩茄子裂開頭者陰乾燒為末水調服治被鬼擊身有青痕作痛以金銀花水煎服愈治男子每至秋冬遍身發紅點作癢此寒氣收斂腠理陽氣不能發越炥郁內作也宜以人參敗毒解表再以補中益氣湯實表而愈治因剝死牛瞀悶令看遍身俱紫泡使急刺泡處良久遂蘇更以敗毒藥而愈治患腦疽面目腫閉頭焮如斗此膀胱濕熱所致以黃連消毒飲二劑次以槐花酒二碗頓退以指按下腫即復起此膿已成也於頸額肩頰各刺一孔膿並湧出口目始開更以托裡藥加金銀花連翹三十劑全愈紅絲瘤東垣云李叔和問中年得一子一歲後身生紅絲瘤而死後四子皆然何也曰汝乃腎中伏火精內有紅絲故也俗名胎瘤汝試取精觀之果如其言遂以滋腎丸數服其妻服六味地黃丸乃受胎生子前證不復作矣蛇入人竅中急以手捻定以刀刮破尾以椒或辛辣物置尾以綿擊之即自出不可拔治婦人産後日食茶粥二十餘碗一月後遍身冰冷數塊人以指按其冷處即冷從指下上應至心如是者二年諸治不效以八物湯去地黃加橘紅入薑汁竹瀝一酒鍾十服乃溫治小兒七歲聞雷則昏倒不知人事以人參當歸身麥門冬少入五味子熬膏盡一斤後聞雷自若治飲食若別有一咽喉斜過膈下徑達左脅而作痞悶以手按之則瀝瀝有聲以控涎丹十粒服之少時痞處熱作一聲轉瀉不痰飲二升再飲食正下而達胃矣治婦人三陰交無故血出如射將絶以指按其竅縛以布條昏倒不知人事以人參一兩煎湯灌之治頸項腫與頭相統按之堅硬漏蘆湯一劑服下發癢頃刻消散治田間收稻忽然遍身癢入骨髓用食鹽九錢泡湯三碗每進一碗探而吐之三進三探則不癢矣以上六法出意庵醫案治小兒遍身癢以生薑搗爛用布包擦之而止治盤腸産者臨産即子腸先出而後産子産子之後其腸不收以醋半盞冷水七分調均噴婦面三噴則腸收盡此良法也丹溪治一婦産戶下一物如帕有尖約重一斤卻喜血不盡虛急與黃耆白朮升麻各五分水參當歸各一錢水煎連服三劑即收上治少婦胸間潰一竅有膿血與口中所咳相應而出以參耆歸加退熱排膿等藥而愈治少年玉莖挺長腫而痿皮塌常潤磨股難行兩脅氣衝上手足倦弱先以小柴胡湯加黃連大劑行其濕熱少加黃柏降其逆上之氣腫漸收莖中硬塊未消以青皮為君佐以散風之藥為末服之外以絲瓜汁調五倍子末傅之愈治病人似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者用生薑半夏湯主之半夏半斤生薑汁一升水三升先煎半夏至二升後入薑汁共煎至一升半小冷分四服日三夜一病止停後服夏月中寒一人暑月行百里渴而飲山水至晚以單席陰地上少睡頃間寒熱吐瀉身如刀刮而痛醫皆曰中暑也進黃連香薷飲不應豫診其脈細緊而伏此中寒也衆皆笑曰六月中寒有是事乎豫以附子理中湯大服乃濟冬天傷暑一婦冬月患灑灑惡寒翕翕發熱惡食乾嘔大便欲去不去諸醫皆以虛弱用滌痰二陳湯不效後請豫治脈虛無力豫曰類乎傷暑衆以為不然豫究之婦曰昨因天寒令取綿套蓋之因得此證豫曰誠哉傷暑也汝之綿套曬之盛暑熱收箱中必有暑氣今體虛得之易入故病如是婦曰然遂用黃連香薷飲進二服其病瘳矣噫冬天傷暑夏月中寒病亦鮮見醫家問切之功活變之法不可不知也以上二方出諸症辨疑治人在山亭裸體而臥其陰莖被飛絲纏繞陰頭腫欲斷以威靈仙搗汁入水浸洗而愈妙應丸治胃寒腸熱水穀不化腸脹痞滿泄利不已用川烏頭去尖半兩梔子仁干蠶各二錢五分生薑汁麵糊丸每五丸溫酒下日二服青橘皮丸治胃熱腸寒善食而飢便溺小腹脹痛大便或澀青皮三稜蓬朮黃連各一兩巴豆霜二錢五分麵糊丸緑豆大茶酒任下三五丸蒺藜湯治陰疝牽引小腹痛諸厥疝即陰疝也蒺藜炒附子炮梔子各一兩每三錢水煎服茴香練實赴筵散治口瘡不已者密陀僧黃柏青黛等分乾摻妙訶子湯治失音不能言語者訶子四個半炮半生桔梗一兩半炙半生甘草二寸半炙半生每二錢童便一盞水一盞煎五七沸溫服甚者不過三服小兒出痘疹眼內有翳輕粉黃丹等分左右反吹耳內妙神應散治春夏間腳指叉濕爛婦人多有此枯礬六錢飛丹五分為末乾摻治婦人腹中諸病當歸一兩半芍藥八兩澤瀉川芎各四兩白朮茯苓各四兩共為末酒調下一錢一日三服産後腹痛煩滿不得臥以枳實略燒黑芍藥等分為末每服一七日三服並主癰膿以麥粥下之湯火傷即將酸醋洗之甚妙治當額害楊梅癰一個數年不愈一方士治之先用藥爛去腐肉偶見內有骨一片如錢大取而去之治仍不效復爛之又有骨一片再取去敷生肌散收口而愈治耳內有丁如棗核大痛不可動後用火酒滴耳內令仰上半時以箝取出絶根治莖頭腫脹大如升光如魚肥以二陳湯加升麻青黛牡蠣水煎服二劑即愈治少年新婚欲交媾女子阻之乃逆其意遂陰痿不舉者五七日以禿筆頭灰酒調下一二錢即起治婦産後因子死經斷不行者半年一日小腹忽痛陰戶內有物如石硬塞之而痛不禁衆醫不識青林曰此石瘕病也用四物加桃仁大黃三稜檳榔玄胡索附子澤瀉血竭為湯二劑而愈治左手無名指爪甲生一小瘡初起麻粒大用小刀挑開瘡頭血出如濁不止日夜長出肉瘤如菌裹指頂內開一孔如一眼目轉動此疔毒也以艾灸四十壯不知疼癢復烙之剪去肉瘤敷拔疔散外以膏藥貼之內服解毒湯七日全愈縮泉丸治脬氣不足小便頻數一日夜百餘次以益智仁天台烏藥大如臂者等分俱為末酒煮山藥打糊為丸如梧桐子臥時用鹽酒送下五七十丸一女子十六歲四腕軟皮處生惡物如黃豆大半在肉內紅紫色痛甚諸藥不效一方士教貫水銀四兩以白紙二張揉熟蘸水銀擦三日自落而愈漏瘡先服蠟礬丸外以油發燒灰雞子黃調傅祖傳牙疼方新掘李樹根取白皮搗細水濃浸一碗時時含之絶根犬咬虎頭骨為末摻之良風狗咬更好烏梅丸治腸風下血烏梅燒灰存性醋糊為丸米飲下七十丸酒毒下血大田螺五個洗淨仰安火上煅乾焦為度作一服酒下立驗膏治痔漏腸頭不收有血者貼之除根黃鱔一條以刀斷其頭血下以掌盛之急取大蜘蛛一枚於內研化瓷罐收之發時塗三五次妙甚虎骨散治肛門突出以虎骨燒灰為末水下一匕日三服眼目一切病羊膽一個入蜜一錢札定重水煮熟入冷水浸一時取出候乾傾入罐內以箸點眼四角妙金絲膏治打破傷損止痛散血退腫嫩松脂二兩熔化傾入水中候冷取出再熔謂之兩熟又下生松脂二兩熔化入麻油五錢油紙攤貼傷處又方緑豆粉新鐵銚內炒紫以新汲水調成膏厚傅傷處貼以紙花杉木皮縛定其效如神商陸膏治石癰不作膿者生商陸根打爛傅之日久自消陰囊濕癢瘡流黃水以白礬為末冷水調洗治諸骨鯁飴糖如雞子黃大吞之如不下更作大團吞之至十團無不下又方金鳳花子嚼爛噙下三錢又催生妙備急丸大黃乾薑巴豆炒等分共搗一千杵煉蜜丸密器貯莫令泄氣加大戟甘遂更妙治心腹卒暴百病及中惡猝死者痛如錐刺白湯酒任下三四丸口禁者灌之如未瘥再進三丸腹中鳴則吐下便瘥雄黃解毒丸治諸證各有引子雄黃鬱金各兩巴豆八錢去油炒焦乳香沒藥各二錢醋糊丸硃砂為衣每服五七丸疔瘡數日毒氣入內服之即效心氣疼醋下纏喉風茶下吐涎妙不吐再服急心疼艾湯下人暴死但心頭有熱灌下無不活氣不順木香湯下諸瘢腫毒癰疽小兒驚風酒下無不效蛇傷雄黃水下發熱白湯下風狗傷斑貓七個炒防風湯下喉痹薄荷湯下乳香酒下身浮腫荊芥艾湯下婦人經行行紅花湯下頭風疼川芎湯下口眼喎斜麻黃湯下膨脹香附湯下痄腮芍藥湯下痢疾甘草湯下瘧證井花水下産後皂角湯下酒食傷鹽湯下赤白帶酒下腰腳痛當歸酒下小兒亦可用半身不遂風證用姜十片棗十枚蔥十根絹袋盛入罐煮酒下日三次緩即浸酒亦可春三夏一秋五冬七小兒刮腸痢眼閉口合禁口至重者精豬肉一兩薄切片熳火炙以膩粉末半錢旋鋪肉上炙令成脯如不吃放鼻頭聞香自然要吃又方臘肉脯煨熟食之妙大人亦可服一婦開甑為熱氣所沖面目腫而經閉用炊飯布經久者燒灰隨傅隨消半日而愈耳中出血龍骨為末吹入即止發背色黑不疼痛者艾葉一斤雄黃硫黃各五錢水煎溫傅十餘度疼則可治若不疼黑血出者難治汗血不止驢糞燒灰吹鼻內即止治患癆瘵二年一日無肉味腹痛不可忍其家恐傳染置於空室待自終三日無肉食或惠雞子病人自煎食將熟忽打噴嚏有紅線二尺許自鼻出入銚遂以碗覆煎熟視之即癆蟲遂安治人自幼好酒片時無酒叫呼不絶全不進食日漸羸瘦或執其手縛柱上將酒與看而不與飲即吐一物如豬肝入酒內其人遂安絶酒不飲雞屎醴散鼓脹旦食不能暮食痞滿大黃桃仁雞屎醴要乾者等分每一錢水一盞姜三片煎湯調下愈後臨臥服又方用豬血不著鹽水待自凝硬瀝去水曬乾為末酒下泄之妙治小兒猝死而吐利不知是何病焉狗屎一丸絞取汁灌之無濕者水煎乾者取汁亦可狐惑證下唇有瘡曰狐乃蟲食其肛黃芩煎湯洗之上唇有瘡曰惑乃蟲食其臟因腹內熱腸胃虛蟲出求食用瀉心湯大黃二兩芩連各一兩水煎服四聖散治小兒胎受熱毒生下兩目不開燈心黃連秦皮木賊草各五錢水一小盞煎澄清頻洗妙室女近窗做女工忽患頭疼甚諸藥不效一醫徐察之窗外畜鵝知為鵝蝨飛入耳內咬而痛也以稻稈煎濃汁灌之蝨死而出遂不痛一居民逃難石室中賊以煙攻之欲死偶得蔔葡食之而蘇又法一口呵地即不死禿積鯽魚一個三四兩重者去腸雜以亂髮填滿濕紙裹燒存性入雄黃生麻油調傅先洗透妙治諸骨鯁以象牙末吹之妙又取犬涎徐徐咽下立效治喉閉牙關不開以針刺少商穴口遂開以膽礬吹入吐痰一二碗仍投防風通聖散而愈少商穴在大指內側去爪甲韭葉許小兒初生身破裂者必死陰囊白者必死陰不起者必死股間無生肉者必死無糞門者必死一云必假物以開之大小子疝腫木鱉子醋磨加芙蓉葉末敷之謝古溪方
